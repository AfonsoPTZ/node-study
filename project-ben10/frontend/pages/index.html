<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben 10 - Aliens API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
            <span class="navbar-brand">🎮 Ben 10 - Aliens API</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4 mb-5">
            <!-- CRIAR ALIEN -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">➕ Criar Alien</h5>
                    </div>
                    <div class="card-body">
                        <form id="form-create">
                            <div class="mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" class="form-control" id="alien-name" placeholder="Ex: XLR8" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Habilidade Especial</label>
                                <input type="text" class="form-control" id="alien-ability" placeholder="Ex: Super velocidade" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Força (0-100)</label>
                                <input type="number" class="form-control" id="alien-strength" min="0" max="100" placeholder="Ex: 60" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Velocidade (0-100)</label>
                                <input type="number" class="form-control" id="alien-speed" min="0" max="100" placeholder="Ex: 95" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Criar Alien</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- ATUALIZAR ALIEN -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">✏️ Atualizar Alien</h5>
                    </div>
                    <div class="card-body">
                        <form id="form-update">
                            <div class="mb-3">
                                <label class="form-label">ID do Alien</label>
                                <input type="number" class="form-control" id="alien-id-update" placeholder="Ex: 1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome (opcional)</label>
                                <input type="text" class="form-control" id="alien-name-update" placeholder="Deixe em branco para não alterar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Habilidade Especial (opcional)</label>
                                <input type="text" class="form-control" id="alien-ability-update" placeholder="Deixe em branco para não alterar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Força (opcional)</label>
                                <input type="number" class="form-control" id="alien-strength-update" min="0" max="100" placeholder="Deixe em branco para não alterar">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Velocidade (opcional)</label>
                                <input type="number" class="form-control" id="alien-speed-update" min="0" max="100" placeholder="Deixe em branco para não alterar">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Atualizar Alien</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- LISTAR ALIENS -->
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">👽 Aliens</h2>
                <div id="aliens-list" class="row g-3"></div>
            </div>
        </div>
    </div>

    <!-- Scripts da API -->
    <script src="../api/aliens/read.js"></script>
    <script src="../api/aliens/create.js"></script>
    <script src="../api/aliens/update.js"></script>
    <script src="../api/aliens/delete.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
