<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard-users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <div class="container py-5">
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="card-header">
                    <h5 class="mb-0">Cria Usuarios</h5>
                </div>
                <div class="card-body">
                    <form id="form-create">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="usuario-name" placeholder="Ex: Afonso" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">cpf</label>
                            <input type="text" class="form-control" id="usuario-cpf" placeholder="Ex: 000.000.000-00" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">telefone</label>
                            <input type="text" class="form-control" id="usuario-telefone" placeholder="41 9 00000000" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-create">Criar Usuario</button>
                    </form>
                </div>
            </div>
        </div>

    </div>






    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">Usuarios</h2>
                <div id="usuarios-list" class="row g-3"></div>
            </div>
        </div>
    </div>


    
    
    <script src="apis/usuarios/read.js"></script>
    <script src="apis/usuarios/create.js"></script>
    <script src="apis/usuarios/delete.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
